{% extends "core/base.html" %}

{% block title %}
    餐廳新增表格
{% endblock title %}

{% block main_content %}

        <div class="row justify-content-around text-white text-center mt-5">
            <div class="col-sm-8">
                <h3>新增資料</h3>
            </div>
        </div>

        <div class="row justify-content-around text-white text-center mt-2">
            <div class="row col-sm-5">
                <form action="" method="POST" class="bg-secondary p-3 rounded shadow-lg">
                    {% csrf_token %}<!--只要是輸入框都要-->
                    {{form.as_p}}

                    <input type="submit" value="新增" class="btn btn-outline-light">
                </form>
            </div>
            

        </div>

    </section>
{% endblock main_content %}
